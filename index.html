<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TRAD Mock Exam</title>

<link rel="manifest" href="manifest.json">

<style>
body{
  margin:0;
  font-family:Segoe UI, Arial;
  background:#0b1b2b;
  color:#fff;
}

#loginScreen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:#0b1b2b;
  padding:20px;
  z-index:9999;
}

#nameInput{
  width:100%;
  max-width:320px;
  padding:12px;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  max-width:320px;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#0072ff;
  color:white;
  font-weight:bold;
}

.container{
  max-width:900px;
  margin:auto;
  padding:10px;
}

.header{
  position:sticky;
  top:0;
  background:#10243b;
  padding:12px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  margin-top:8px;
}

.timer{color:#ffd369;font-weight:bold;}
.score{color:#7CFF6B;font-weight:bold;}

.card{
  background:#ffffff10;
  padding:14px;
  margin-top:12px;
  border-radius:12px;
}

label{
  display:block;
  padding:8px;
  margin:6px 0;
  background:#ffffff10;
  border-radius:8px;
}

.explanation{
  display:none;
  margin-top:10px;
  padding:10px;
  background:#ffffff10;
  border-left:3px solid #00c6ff;
}
</style>
</head>

<body>

<div id="loginScreen">
  <h2>Enter Your Name</h2>
  <input id="nameInput" placeholder="Full Name">
  <button onclick="startExam()">Start Exam</button>
</div>

<div class="container">

  <div class="header">
    <h2>TRAD MOCK EXAM</h2>

    <div class="topbar">
      <div class="timer" id="timer">60:00</div>
      <div class="score" id="scoreTop">Score: --</div>
    </div>
  </div>

  <form id="quizForm"></form>

  <button onclick="submitQuiz()">Submit</button>

</div>

<script>

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}

const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbytz3QDrucqn0TJ9BWd-W9bLqAdUJJxRjxzwLsFL-TuNEPnage0CYoux24QdIPMYle6kA/exec";

let user = sessionStorage.getItem("exam_user");
let questions = [];
let time = 3600;
let timer;

/* TIMER */
function startTimer(){
  timer = setInterval(()=>{
    let m = Math.floor(time/60);
    let s = time%60;

    document.getElementById("timer").innerText =
      `${m}:${s<10?'0':''}${s}`;

    time--;

    if(time < 0){
      clearInterval(timer);
      submitQuiz();
    }
  },1000);
}

/* START EXAM */
function startExam(){

  let name = document.getElementById("nameInput").value.trim();
  if(!name) return alert("Enter name");

  user = name;
  sessionStorage.setItem("exam_user", name);

  document.getElementById("loginScreen").style.display="none";

  loadQuestions();
  startTimer();
}

/* AUTO LOGIN */
if(user){
  window.addEventListener("load",()=>{
    document.getElementById("loginScreen").style.display="none";
    loadQuestions();
    startTimer();
  });
}

/* SHUFFLE */
function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}

/* LOAD QUESTIONS */
function loadQuestions(){

  if(navigator.onLine){

    fetch(GOOGLE_SCRIPT_URL)
      .then(r=>r.json())
      .then(data=>{

        console.log("Loaded:", data.length);

        localStorage.setItem("cachedQuestions", JSON.stringify(data));

        shuffle(data);

        questions = data.slice(0,110);

        render();

      })
      .catch(loadOffline);

  }else{
    loadOffline();
  }
}

/* OFFLINE MODE */
function loadOffline(){

  let cached = localStorage.getItem("cachedQuestions");

  if(!cached){
    alert("No offline data. Open once online first.");
    return;
  }

  let data = JSON.parse(cached);

  shuffle(data);

  questions = data.slice(0,110);

  render();

  alert("Offline Mode");
}

/* RENDER */
function render(){

  const form = document.getElementById("quizForm");
  form.innerHTML="";

  questions.forEach((q,i)=>{

    let choices = [...q.c];
    shuffle(choices);

    q.correct = choices.indexOf(q.c[q.a]);

    let div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <p><b>${i+1}.</b> ${q.q}</p>

      ${choices.map((c,j)=>`
        <label>
          <input type="radio" name="q${i}" value="${j}">
          ${c}
        </label>
      `).join("")}

      <div class="explanation" id="e${i}"></div>
    `;

    form.appendChild(div);
  });
}

/* SUBMIT */
function submitQuiz(){

  clearInterval(timer);

  let score = 0;

  questions.forEach((q,i)=>{

    let sel = document.querySelector(`input[name=q${i}]:checked`);
    let e = document.getElementById("e"+i);

    if(sel && parseInt(sel.value)===q.correct){
      score++;
      e.innerHTML="✅ Correct<br>"+q.e;
    }else{
      e.innerHTML="❌ Wrong<br>Answer: <b>"+q.c[q.a]+"</b><br>"+q.e;
    }

    e.style.display="block";
  });

  let passing = Math.ceil(questions.length*0.90);
  let result = score>=passing ? "PASS":"FAIL";

  document.getElementById("scoreTop").innerText =
    `Score: ${score}/${questions.length} - ${result}`;

  if(navigator.onLine){

    fetch(GOOGLE_SCRIPT_URL,{
      method:"POST",
      body:JSON.stringify({
        name:user,
        score:`${score}/${questions.length}`,
        result:result
      })
    });

  }else{

    let logs = JSON.parse(localStorage.getItem("offlineResults")||"[]");

    logs.push({
      name:user,
      score:`${score}/${questions.length}`,
      result:result
    });

    localStorage.setItem("offlineResults", JSON.stringify(logs));
  }

  alert(`Score: ${score}/${questions.length}\nResult: ${result}`);
}

</script>

</body>
</html>
